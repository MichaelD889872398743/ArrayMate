name: Build Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build portable Windows package
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart("v")
          $packageVersion = python -c "import ast; tree=ast.parse(open('arraymate/__init__.py', encoding='utf-8').read()); print(next(ast.literal_eval(n.value) for n in tree.body if isinstance(n, ast.Assign) for t in n.targets if getattr(t, 'id', '') == '__version__'))"
          if ($tagVersion -ne $packageVersion) {
            throw "Tag version $tagVersion does not match package version $packageVersion"
          }

      - name: Build portable package
        run: python build_exe.py portable-python

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArrayMate-Windows-PortablePython
          path: ArrayMate-v*-Windows-PortablePython.zip
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ArrayMate ${{ github.ref_name }}
          files: ArrayMate-v*-Windows-PortablePython.zip
          generate_release_notes: true
